{% extends "base.html" %}

{% block title %}Join Shared Quiz - UniTest{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="mb-3">Join Shared Quiz</h2>
  <p class="text-muted">Enter the code provided by your teacher to start the quiz.</p>

  <div class="card">
    <div class="card-body">
      <form method="POST" id="joinQuizForm">
        <div class="mb-3">
          <label class="form-label">Quiz Code</label>
          <input name="code" class="form-control" placeholder="e.g., 7G2KQX" required>
        </div>
        <div class="d-flex gap-2">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          <button class="btn btn-primary" type="submit" id="joinQuizBtn">Join Quiz</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  async function requestPreJoinPermissions() {
    // Request camera + screen permission before entering quiz page.
    // This reduces unexpected focus/blur violations during quiz startup.
    let camStream = null;
    let screenStream = null;
    try {
      camStream = await navigator.mediaDevices.getUserMedia({ video: true });
    } catch (e) {
      throw new Error('Camera access is required before joining the quiz.');
    }
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    } catch (e) {
      throw new Error('Screen sharing permission is required before joining the quiz.');
    } finally {
      if (camStream) camStream.getTracks().forEach(function(t) { t.stop(); });
      if (screenStream) screenStream.getTracks().forEach(function(t) { t.stop(); });
    }
  }

  function captureToDataUrl(stream, maxW) {
    return new Promise(function(resolve) {
      if (!stream || !stream.getVideoTracks || !stream.getVideoTracks().length) {
        resolve(null);
        return;
      }
      var v = document.createElement('video');
      v.srcObject = stream;
      v.muted = true;
      v.playsInline = true;
      v.onloadeddata = function() {
        try {
          var c = document.createElement('canvas');
          var t = stream.getVideoTracks()[0].getSettings();
          var w = t.width || 640, h = t.height || 480;
          if (maxW && w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(v, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', 0.6));
        } catch (e) {
          resolve(null);
        }
      };
      v.play().catch(function() { resolve(null); });
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('joinQuizForm');
    var btn = document.getElementById('joinQuizBtn');
    if (!form || !btn || !navigator.mediaDevices) return;

    form.addEventListener('submit', async function(e) {
      if (form.dataset.permissionsChecked === 'true') return;
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Checking permissions...';
      try {
        // Ask permissions before join and capture initial proof snapshots.
        let camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        let screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        let camShot = await captureToDataUrl(camStream, 400);
        let screenShot = await captureToDataUrl(screenStream, 800);
        let capturedAt = new Date().toISOString();
        try {
          sessionStorage.setItem('prejoin_cam_snapshot', camShot || '');
          sessionStorage.setItem('prejoin_screen_snapshot', screenShot || '');
          sessionStorage.setItem('prejoin_captured_at', capturedAt);
        } catch (e) {}
        camStream.getTracks().forEach(function(t) { t.stop(); });
        screenStream.getTracks().forEach(function(t) { t.stop(); });
        form.dataset.permissionsChecked = 'true';
        form.submit();
      } catch (err) {
        alert(err.message || 'Permission check failed. Please allow required permissions.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Join Quiz';
      }
    });
  });
</script>
{% endblock %}
