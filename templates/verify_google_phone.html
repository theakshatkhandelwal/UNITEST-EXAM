{% extends "base.html" %}

{% block title %}Verify Mobile - Google Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-3 text-primary">Verify Mobile Number</h3>
                    <p class="text-muted">
                        Google sign-in is complete for <strong>{{ user.email }}</strong>. Verify mobile OTP to finish login.
                    </p>

                    <form method="POST" class="mb-3">
                        <input type="hidden" name="action" value="send">
                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" class="form-control" name="phone_number" value="{{ pending.phone_number if pending else '' }}" placeholder="+919999999999" required>
                        </div>
                        <button type="submit" class="btn btn-outline-primary w-100">Send OTP</button>
                    </form>

                    {% if pending %}
                    <form method="POST" class="mb-2">
                        <input type="hidden" name="action" value="verify">
                        <div class="mb-3">
                            <label class="form-label">Enter OTP</label>
                            <input type="text" class="form-control" name="phone_otp" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Verify & Continue</button>
                    </form>
                    <form method="POST">
                        <input type="hidden" name="action" value="resend">
                        <button type="submit" class="btn btn-outline-secondary w-100">Resend OTP</button>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
