{% extends "base.html" %}

{% block title %}Verify Signup OTP - UniTest{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-3 text-primary">Verify Email OTP</h3>
                    <p class="text-muted mb-4">
                        OTP sent to <strong>{{ pending.email }}</strong>.
                    </p>

                    <form method="POST" class="mb-3">
                        <input type="hidden" name="action" value="verify">
                        <div class="mb-3">
                            <label class="form-label">Email OTP</label>
                            <input type="text" class="form-control" name="email_otp" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Verify & Create Account</button>
                    </form>
                    <form method="POST">
                        <input type="hidden" name="action" value="resend_email">
                        <button type="submit" class="btn btn-outline-secondary w-100">Resend Email OTP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
